<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="../styles/style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/fontawesome.min.css" integrity="sha384-jLKHWM3JRmfMU0A5x5AkjWkw/EYfGUAGagvnfryNV3F9VqM98XiIH7VBGVoxVSc7" crossorigin="anonymous">
    <title>The weather app</title>
</head>
<body>
    <header id="header-div">
        <nav id="center">
            <div id="logo">
                <a href="#"><img src="../images/weather.png" alt="" height= "70px" width="70px"></a>
            </div>

            <div id="outer-navigation-container">
                <div id="links-and-contact-container">
                    <ul>
                        <li class=".links">Home</li>
                        <li class=".links">About</li>
                        <li class=".links">Legal</li>
                    </ul>

                    <div id="contact-btn">
                        <a href="#"><button type="button" class="btn btn-primary">Contact</button></a>
                    </div>
                </div>

                <div id="burger-btn">
                    <i id = "burger-btn-icon"class="fa fa-bars" style="font-size:30px;"></i>
                </div>
            </div>
        </nav>
    </header>

    
    <section id="page-section">
        <div id="form-outer-container">
            <form action="">
                <div class="form-group">
                    <input type="text" placeholder="City Name" id="city-name-input" class="form-control-plaintext" style="color: black;">
                </div>
                <div class="form-group">
                    <i class="fa fa-search" aria-hidden="true" id="search-btn"></i>
                </div> 
            </form>
            <div id="error"></div>
        </div>
        
        <div id="data-container">
            <div class="city-name-and-icon">
                <div class="city-name">
                    <h2>City Name</h2>
                </div>
                <div class="weather-icon">
                    <i class="fa fa-sun" aria-hidden="true"></i>
                </div>
            </div>

            <div class="temp-display">
                <div class="actual-temp">
                    <h2>Temperature(°C)</h2>
                    <div class="temp-number" id="actual-temp-number"></div>
                </div>
                <div class="feels-like-temp">
                    <h2>Feels Like(°C)</h2>
                    <div class="temp-number" id="feels-like-number"></div>
                </div>
            </div>

        </div>
        <div id="grid-container">
            <div id = "wind-info"class="grid-item">
                <p>Wind Speeds <strong>(m/s)</strong></p>
                <div id="wind-info-value" class="data-value"></div>
            </div>
            <div id = "humidity-info" class="grid-item">
                <p>Humidity <strong>(%)</strong></p>
                <div id="humdity-info-value" class="data-value"></div>
            </div>
            <div id = "coord-info" class="grid-item">
                <p>Lat,lon</p>
                <div id="coord-info-value" class="data-value"></div>
            </div>
        </div>
    </section>

    <script src="../scripts/bundle.js"></script>
</body>
</html>
